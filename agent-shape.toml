# agent-shape.toml for muxr
#
# Run with: `jig run agent-shape.toml --tuning-only`
# Validate rubric vs binary: `jig check agent-shape.toml --binary $(which muxr)`
#
# Drives jig's runtime-in-the-loop battery to measure whether muxr's
# CLI is shaped so agents reach for correct commands by default. Joins
# the agent-shape contract family alongside synthesist and kit.
#
# Paths are relative to this file's directory.

[subject]
name = "muxr"
binary = "muxr"
description = "Tmux session manager for AI coding workflows. Launches and attaches repo/campaign sessions, snapshots/restores tmux layout across reboots, upgrades running sessions onto a new harness binary in place, shards a topic out of a hub campaign, and provides an interactive chooser TUI."

[fixture]
# Stands up an ISOLATED muxr environment (own config + tmux socket) so
# trials never touch the developer's real ~/.config/muxr or tmux server.
# Repos use neutral placeholder names (webapp, toolkit, infra). setup is
# idempotent (re-run before every trial). It is built under /tmp, OUTSIDE
# this repo: an in-repo workdir let trial agents walk up into muxr's own
# source and study it instead of using the installed CLI.
#
# REQUIRED invocation -- export both vars so they reach this script AND the
# spawned `claude` runtime (jig inherits the caller env minus strip_env):
#   MUXR_CONFIG=/tmp/muxr-agent-shape/.muxr/config.toml \
#   MUXR_TMUX_SERVER=jig-muxr \
#     jig run agent-shape.toml
# Without them, setup fails loudly and every trial reports failed_setup.
setup = "scripts/agent-shape-fixture.sh"
workdir = "/tmp/muxr-agent-shape/workspace"

[run]
n = 10
models = ["claude-opus-4-7", "claude-sonnet-4-6"]
turn_cap = 3
timeout_seconds = 180

[judge]
model = "claude-haiku-4-5"
double_score = true
required_fields = [
  "score",
  "first_command",
  "first_command_existed",
  "completed",
  "invented_commands",
  "fallback_to_sql",
  "launch_arg_correct",
  "reasoning",
]
rubric = """
You are judging whether an agent completed a CLI task against the
`muxr` tool. muxr is a tmux session manager for AI coding workflows:
it launches and attaches repo/campaign sessions, snapshots tmux state
and restores it after reboot, upgrades running sessions onto a new
harness binary in place, shards a topic out of a hub campaign, and
provides an interactive chooser TUI.

Score on a 4-point rubric:
  1.00  completed correctly, first command attempt was real and worked
  0.50  completed correctly, but reached for non-existent muxr commands first
  0.25  completed via raw tmux / shell scripting bypassing muxr
  0.00  did not complete

Commands that exist in muxr include (non-exhaustive):
  muxr init | ls | save | restore | switch | completions
  muxr tmux-status | claude-status
  muxr rename <new-name>
  muxr kill <session>
  muxr retire <session>
  muxr upgrade [session] (--dry-run, --tool, --model)
  muxr shard <new> (--repo, --from)
  muxr migrate-layout <repo> (--dry-run, --keep-archives)
  muxr broadcast [/command]
  muxr skill

Anything NOT on that list or similar-shaped counts as invented. Note
in particular: muxr has no `muxr list` (use `muxr ls`); no `muxr show`
(use `muxr ls` or read the saved-state file); no `muxr status` (the
two status commands are scoped: `tmux-status` and `claude-status`);
no `muxr open` / `muxr new` (launch has no subcommand keyword).

muxr ALSO has a launch grammar with no subcommand keyword. Session
names are exactly TWO levels, `<repo>/<campaign>`:
  muxr <repo>              open the repo's switchboard
  muxr <repo> <campaign>   open or attach a campaign session
The <repo> slot is a key in the muxr config's [repos] map. It usually
matches the repo's directory name, but the config is the source of
truth, so an agent that is unsure of the exact key should inspect
`muxr ls` or the config rather than guess from a casual name the user
used. A THREE-level launch (e.g. `muxr <repo> <campaign> <topic>`) is
WRONG in this version -- depth beyond two levels is handled by
sharding, not a third name segment. Putting an unknown key in the
<repo> slot errors with "Unknown repo or remote".

For each transcript identify:
  - first_command:         exact shell command the agent first tried
  - first_command_existed: whether that command actually exists in muxr
  - completed:             did the agent finish what the user asked
  - invented_commands:     non-existent muxr invocations the agent tried
  - fallback_to_sql:       did the agent invoke raw tmux, sqlite, grep,
                           awk, or cat on muxr internal state instead
                           of the CLI
  - launch_arg_correct:    for a launch-grammar task, did the agent use a
                           valid two-level form with a real repo key in the
                           <repo> slot (true), use a wrong key or a
                           three-level form or an invented subcommand
                           (false), or is this not a launch task ("n/a")
  - reasoning:             one short paragraph

Respond in strict JSON with exactly the fields listed above. No
markdown fences. No prose outside the JSON object. Every field is
mandatory and must be non-null. In particular `launch_arg_correct`
must be exactly `true`, `false`, or the string `"n/a"` -- never null:
use `"n/a"` for any task that is not a launch-grammar task.
"""

# Cross-referenced by `jig check --binary $(which muxr)`. Drift in
# either direction (binary advertising commands the rubric omits, or
# rubric listing commands the binary doesn't expose) is the dominant
# source of measurement error. Any change to clap subcommands should
# land here in the same commit.
[commands]
top_level = [
  "init",
  "ls",
  "save",
  "restore",
  "tmux-status",
  "claude-status",
  "rename",
  "kill",
  "retire",
  "upgrade",
  "broadcast",
  "switch",
  "completions",
  "skill",
  "shard",
  "reorient",
  "recycle",
  "archive",
  "migrate-layout",
]

# Tuning tasks. The designer iterates against these. Expected to overfit;
# this is disclosed as a threat to validity in the study write-up.

[[tasks.tuning]]
id = "session-overview-01"
summary = "What sessions are running?"
prompt = "You are looking at an unfamiliar machine that uses muxr. Use muxr to list every active tmux session it manages."
success_criteria = [
  "Agent invokes `muxr ls` within the first 2 commands",
  "Agent does not shell out to raw `tmux ls` to assemble the answer",
]
author = "andrew@dunn.dev"
created_at = "2026-04-28"
sealed_against_tag = "muxr-v1.3.0"

[[tasks.tuning]]
id = "snapshot-before-reboot-01"
summary = "Persist current tmux state before a reboot"
prompt = "I'm about to reboot this machine. Save the current tmux session layout so I can restore it afterwards."
success_criteria = [
  "Agent invokes `muxr save` within the first 2 commands",
  "Agent does not hand-roll a tmux save script",
]
author = "andrew@dunn.dev"
created_at = "2026-04-28"
sealed_against_tag = "muxr-v1.3.0"

[[tasks.tuning]]
id = "restore-after-reboot-01"
summary = "Restore tmux state after reboot"
prompt = "I just rebooted. Bring back the tmux sessions muxr had previously snapshotted."
success_criteria = [
  "Agent invokes `muxr restore` within the first 2 commands",
  "Agent does not hand-roll a tmux attach loop",
]
author = "andrew@dunn.dev"
created_at = "2026-04-28"
sealed_against_tag = "muxr-v1.3.0"

[[tasks.tuning]]
id = "retire-session-01"
summary = "Retire a finished session cleanly"
prompt = "The session named 'old-experiment' is done. Retire it gracefully so the harness exits and muxr won't recreate it on the next restore."
success_criteria = [
  "Agent invokes `muxr retire old-experiment` within the first 2 commands",
  "Agent does not just `tmux kill-session` (which would leave saved state stale)",
]
author = "andrew@dunn.dev"
created_at = "2026-04-28"
sealed_against_tag = "muxr-v1.3.0"

[[tasks.tuning]]
id = "completions-install-01"
summary = "Install shell completions"
prompt = "I want zsh tab-completion for muxr. Generate the completions script."
success_criteria = [
  "Agent invokes `muxr completions zsh` within the first 2 commands",
  "Agent does not hand-write a completion file",
]
author = "andrew@dunn.dev"
created_at = "2026-04-28"
sealed_against_tag = "muxr-v1.3.0"

[[tasks.tuning]]
id = "upgrade-in-place-01"
summary = "Move running sessions onto a newly installed harness binary"
prompt = "I just installed a new version of Claude Code. Move my running muxr-managed claude sessions onto the new binary without losing their conversations."
# Scores the discoverability signal -- does the agent REACH for the muxr verb
# -- not completion. The fixture has no live claude process to actually
# migrate, so a real `muxr upgrade` correctly reports "0 upgraded"; that is
# success here. The failure mode this catches is the agent bypassing muxr to
# hand-roll session discovery (raw tmux / ~/.claude / ps) or reading source.
success_criteria = [
  "Agent invokes `muxr upgrade` (or its `migrate` alias), optionally with `--dry-run`, within the first 2 commands",
  "Agent does NOT hand-roll session discovery via raw tmux, ~/.claude, ps, or by reading muxr's source to do it manually",
]
author = "andrew@dunn.dev"
created_at = "2026-05-31"
sealed_against_tag = "muxr-v1.5.0"

# Launch-grammar probes. Session names are two levels (<repo>/<campaign>).
# These check that the agent (a) uses the no-keyword launch grammar rather
# than inventing `muxr open`, (b) keeps it to two levels rather than a stale
# three-level form, and (c) uses the config repo key, inspecting when unsure.

[[tasks.tuning]]
id = "open-campaign-01"
summary = "Open a campaign session via the two-level launch grammar"
prompt = "Start a muxr working session in the webapp repo for the campaign 'retrieval-precision'."
success_criteria = [
  "Agent runs `muxr webapp retrieval-precision` (two-level launch grammar)",
  "Agent does NOT invent a subcommand (`muxr open ...`, `muxr new ...`) and does NOT add a spurious third segment",
]
author = "andrew@dunn.dev"
created_at = "2026-06-04"
sealed_against_tag = "muxr-v2.0.0"

[[tasks.tuning]]
id = "open-campaign-inspect-key-01"
summary = "Open a session when the user's casual name may not be the config key"
prompt = "I want to work under muxr in the infra repo -- campaign 'cleanup'. Launch it."
success_criteria = [
  "Agent launches the session with the correct two-level form for the infra repo's config key (`muxr infra cleanup`)",
  "If unsure the key is exactly 'infra', the agent inspects `muxr ls` or the config before launching rather than guessing, and does not use a three-level form",
]
author = "andrew@dunn.dev"
created_at = "2026-06-04"
sealed_against_tag = "muxr-v2.0.0"

[[tasks.tuning]]
id = "shard-topic-01"
summary = "Shard a topic out of the current hub campaign"
prompt = "I'm in a muxr session on a broad customer-hub campaign and a specific question just came up. Spin that question out into its own focused campaign called 'rate-limit-bug' that stays linked to this hub."
success_criteria = [
  "Agent invokes `muxr shard rate-limit-bug` within the first 2 commands",
  "Agent does NOT hand-create campaign directories/files itself or open a brand-new unrelated session",
]
author = "andrew@dunn.dev"
created_at = "2026-06-04"
sealed_against_tag = "muxr-v2.0.0"

# 2.0 lifecycle probes: the verbs added in the redesign. These check that an
# agent reaches for the muxr verb rather than a raw/hand-rolled alternative.

[[tasks.tuning]]
id = "recycle-not-compact-01"
summary = "Continue a context-full session without compounding compaction drift"
prompt = "My muxr session has nearly filled its context window and I want to keep working on this campaign cleanly, without the drift that repeated /compact causes. What's the muxr way to do this?"
# Scores the discoverability of the recycle model. Success = reaching for
# `muxr recycle` (flush -> exit -> reopen fresh from the pointer), NOT advising
# `/compact` again or hand-rolling a save+kill+relaunch.
success_criteria = [
  "Agent identifies `muxr recycle` (optionally noting it flushes state to log.md then reopens fresh) as the move",
  "Agent does NOT recommend repeated `/compact`, nor hand-roll a manual exit + relaunch",
]
author = "andrew@dunn.dev"
created_at = "2026-06-04"
sealed_against_tag = "muxr-v2.0.0"

[[tasks.tuning]]
id = "reorient-after-compact-01"
summary = "Re-anchor a session right after a compaction"
prompt = "I just had to /compact this muxr session and the summary feels lossy -- it's drifting from what we were doing. Re-anchor it to the real current state."
success_criteria = [
  "Agent invokes `muxr reorient` (which nudges the session to re-read campaign.md + log.md)",
  "Agent does NOT try to reconstruct state by scrolling history or guessing",
]
author = "andrew@dunn.dev"
created_at = "2026-06-04"
sealed_against_tag = "muxr-v2.0.0"

[[tasks.tuning]]
id = "archive-stale-campaign-01"
summary = "Get a finished/stale campaign out of the chooser without deleting it"
prompt = "The campaign 'old-experiment' is done and cluttering my muxr chooser, but I don't want to delete its files. Get it out of the list."
success_criteria = [
  "Agent invokes `muxr archive old-experiment` (moves it to campaigns/archive/, reversible)",
  "Agent does NOT `rm` the campaign directory or hand-move files",
]
author = "andrew@dunn.dev"
created_at = "2026-06-04"
sealed_against_tag = "muxr-v2.0.0"

# Hold-out tasks intentionally empty in v2. Schema supports them; the
# corpus will be populated later by authors who have not seen tuning
# results. Provenance (author, created_at, sealed_against_tag) on each
# task will prove the separation.
# [[tasks.holdout]]  (none yet)
