# agent-shape.toml for muxr
#
# Run with: `jig run agent-shape.toml --tuning-only`
# Validate rubric vs binary: `jig check agent-shape.toml --binary $(which muxr)`
#
# Drives jig's runtime-in-the-loop battery to measure whether muxr's
# CLI is shaped so agents reach for correct commands by default. Joins
# the agent-shape contract family alongside synthesist and kit.
#
# Paths are relative to this file's directory.

[subject]
name = "muxr"
binary = "muxr"
description = "Tmux session manager for AI coding workflows. Snapshots/restores tmux session layout across reboots, generates statuslines for tmux and Claude Code, and provides an interactive session switcher."

[fixture]
# Stands up an ISOLATED muxr environment (own config + tmux socket) so
# trials never touch the developer's real ~/.config/muxr or tmux server.
# The fixture mirrors the real harness->repo split (nomograph->keaton,
# dunn->storr, tanuki->tanuki), which is what the harness-selection probes
# bait. setup is idempotent (re-run before every trial). It is built under
# /tmp, OUTSIDE this repo: an in-repo workdir let trial agents walk up into
# muxr's own source and study it instead of using the installed CLI.
#
# REQUIRED invocation -- export both vars so they reach this script AND the
# spawned `claude` runtime (jig inherits the caller env minus strip_env):
#   MUXR_CONFIG=/tmp/muxr-agent-shape/.muxr/config.toml \
#   MUXR_TMUX_SERVER=jig-muxr \
#     jig run agent-shape.toml
# Without them, setup fails loudly and every trial reports failed_setup.
setup = "scripts/agent-shape-fixture.sh"
workdir = "/tmp/muxr-agent-shape/workspace"

[run]
n = 10
models = ["claude-opus-4-7", "claude-sonnet-4-6"]
turn_cap = 3
timeout_seconds = 180

[judge]
model = "claude-haiku-4-5"
double_score = true
required_fields = [
  "score",
  "first_command",
  "first_command_existed",
  "completed",
  "invented_commands",
  "fallback_to_sql",
  "harness_arg_correct",
  "reasoning",
]
rubric = """
You are judging whether an agent completed a CLI task against the
`muxr` tool. muxr is a tmux session manager for AI coding workflows:
it snapshots tmux session state, restores it after reboot, generates
tmux and Claude Code statuslines, and provides an interactive session
switcher TUI.

Score on a 4-point rubric:
  1.00  completed correctly, first command attempt was real and worked
  0.50  completed correctly, but reached for non-existent muxr commands first
  0.25  completed via raw tmux / shell scripting bypassing muxr
  0.00  did not complete

Commands that exist in muxr include (non-exhaustive):
  muxr init | ls | save | restore | switch | completions
  muxr tmux-status | claude-status
  muxr rename <new-name>
  muxr kill <session>
  muxr retire <session>
  muxr upgrade [session] (--dry-run, --tool, --model)
  muxr broadcast [/command]
  muxr skill

Anything NOT on that list or similar-shaped counts as invented. Note
in particular: muxr has no `muxr list` (use `muxr ls`); no `muxr show`
(use `muxr ls` or read the saved-state file); no `muxr status` (the
two status commands are scoped: `tmux-status` and `claude-status`).

muxr ALSO has a launch grammar with no subcommand keyword:
  muxr <harness>                     open the harness's switchboard
  muxr <harness> <campaign> <topic>  open or attach a campaign session
The <harness> slot is a key in the muxr config's [harnesses] map (e.g.
`nomograph`, `dunn`, `tanuki`). It is NOT the repository name. A harness
is rooted in a repo that may have a DIFFERENT name: the `nomograph`
harness opens the `keaton` repo; the `dunn` harness opens the `storr`
repo; the `tanuki` harness happens to open the `tanuki` repo. Putting a
repository name in the <harness> slot (e.g. `muxr keaton ...` or
`muxr storr ...`) is WRONG -- muxr errors with "Unknown harness". An
agent that does not know the harness key should inspect `muxr ls` or the
config first rather than guess from the repo name. This repo-vs-harness
slip is the specific failure this battery probes; judge it honestly.

For each transcript identify:
  - first_command:         exact shell command the agent first tried
  - first_command_existed: whether that command actually exists in muxr
  - completed:             did the agent finish what the user asked
  - invented_commands:     non-existent muxr invocations the agent tried
  - fallback_to_sql:       did the agent invoke raw tmux, sqlite, grep,
                           awk, or cat on muxr internal state instead
                           of the CLI
  - harness_arg_correct:   for a launch-grammar task, did the agent put a
                           real harness key in the <harness> slot (true),
                           use a repo name or other wrong identifier
                           (false), or is this not a launch task ("n/a")
  - reasoning:             one short paragraph

Respond in strict JSON with exactly the fields listed above. No
markdown fences. No prose outside the JSON object. Every field is
mandatory and must be non-null. In particular `harness_arg_correct`
must be exactly `true`, `false`, or the string `"n/a"` -- never null:
use `"n/a"` for any task that is not a launch-grammar task.
"""

# Cross-referenced by `jig check --binary $(which muxr)`. Drift in
# either direction (binary advertising commands the rubric omits, or
# rubric listing commands the binary doesn't expose) is the dominant
# source of measurement error. Any change to clap subcommands should
# land here in the same commit.
[commands]
top_level = [
  "init",
  "ls",
  "save",
  "restore",
  "tmux-status",
  "claude-status",
  "rename",
  "kill",
  "retire",
  "upgrade",
  "broadcast",
  "switch",
  "completions",
  "skill",
]

# Tuning tasks. The designer iterates against these. Expected to overfit;
# this is disclosed as a threat to validity in the study write-up.

[[tasks.tuning]]
id = "session-overview-01"
summary = "What sessions are running?"
prompt = "You are looking at an unfamiliar machine that uses muxr. Use muxr to list every active tmux session it manages."
success_criteria = [
  "Agent invokes `muxr ls` within the first 2 commands",
  "Agent does not shell out to raw `tmux ls` to assemble the answer",
]
author = "andrew@dunn.dev"
created_at = "2026-04-28"
sealed_against_tag = "muxr-v1.3.0"

[[tasks.tuning]]
id = "snapshot-before-reboot-01"
summary = "Persist current tmux state before a reboot"
prompt = "I'm about to reboot this machine. Save the current tmux session layout so I can restore it afterwards."
success_criteria = [
  "Agent invokes `muxr save` within the first 2 commands",
  "Agent does not hand-roll a tmux save script",
]
author = "andrew@dunn.dev"
created_at = "2026-04-28"
sealed_against_tag = "muxr-v1.3.0"

[[tasks.tuning]]
id = "restore-after-reboot-01"
summary = "Restore tmux state after reboot"
prompt = "I just rebooted. Bring back the tmux sessions muxr had previously snapshotted."
success_criteria = [
  "Agent invokes `muxr restore` within the first 2 commands",
  "Agent does not hand-roll a tmux attach loop",
]
author = "andrew@dunn.dev"
created_at = "2026-04-28"
sealed_against_tag = "muxr-v1.3.0"

[[tasks.tuning]]
id = "retire-session-01"
summary = "Retire a finished session cleanly"
prompt = "The session named 'old-experiment' is done. Retire it gracefully so the harness exits and muxr won't recreate it on the next restore."
success_criteria = [
  "Agent invokes `muxr retire old-experiment` within the first 2 commands",
  "Agent does not just `tmux kill-session` (which would leave saved state stale)",
]
author = "andrew@dunn.dev"
created_at = "2026-04-28"
sealed_against_tag = "muxr-v1.3.0"

[[tasks.tuning]]
id = "completions-install-01"
summary = "Install shell completions"
prompt = "I want zsh tab-completion for muxr. Generate the completions script."
success_criteria = [
  "Agent invokes `muxr completions zsh` within the first 2 commands",
  "Agent does not hand-write a completion file",
]
author = "andrew@dunn.dev"
created_at = "2026-04-28"
sealed_against_tag = "muxr-v1.3.0"

[[tasks.tuning]]
id = "upgrade-in-place-01"
summary = "Move running sessions onto a newly installed harness binary"
prompt = "I just installed a new version of Claude Code. Move my running muxr-managed claude sessions onto the new binary without losing their conversations."
# Scores the discoverability signal -- does the agent REACH for the muxr verb
# -- not completion. The fixture has no live claude process to actually
# migrate, so a real `muxr upgrade` correctly reports "0 upgraded"; that is
# success here. The failure mode this catches is the agent bypassing muxr to
# hand-roll session discovery (raw tmux / ~/.claude / ps) or reading source.
success_criteria = [
  "Agent invokes `muxr upgrade` (or its `migrate` alias), optionally with `--dry-run`, within the first 2 commands",
  "Agent does NOT hand-roll session discovery via raw tmux, ~/.claude, ps, or by reading muxr's source to do it manually",
]
author = "andrew@dunn.dev"
created_at = "2026-05-31"
sealed_against_tag = "muxr-v1.5.0"

# Launch-grammar / harness-selection probes. These bait the repo-vs-harness
# slip on purpose: the prompt names the repository, but the correct
# <harness> slot is the config key, which may differ from the repo name.
# A high false rate on `harness_arg_correct` is a signal that the surface
# (not the agent) needs reshaping -- aliases, clearer `ls`/`--help`, or
# renaming harness keys to match repos.

[[tasks.tuning]]
id = "open-session-by-repo-name-01"
summary = "Open a campaign session, prompt names the repo not the harness"
prompt = "Start a muxr working session on the keaton repository for the campaign 'factory', topic 'metrics'."
success_criteria = [
  "Agent opens the session with the correct harness key for the keaton repo (`muxr nomograph factory metrics`), not the repo name (`muxr keaton ...`)",
  "If unsure which harness serves keaton, the agent inspects `muxr ls` or the config before launching rather than guessing the repo name",
]
author = "andrew@dunn.dev"
created_at = "2026-05-31"
sealed_against_tag = "muxr-v1.5.0"

[[tasks.tuning]]
id = "open-session-by-repo-name-02"
summary = "Open a campaign session for a second repo with a different harness name"
prompt = "I want to work in the storr repo under muxr -- campaign 'harness', topic 'cleanup'. Launch the session."
success_criteria = [
  "Agent opens the session with the correct harness key for the storr repo (`muxr dunn harness cleanup`), not the repo name (`muxr storr ...`)",
  "Agent does not invent a subcommand (e.g. `muxr open ...`) for the launch grammar",
]
author = "andrew@dunn.dev"
created_at = "2026-05-31"
sealed_against_tag = "muxr-v1.5.0"

# Hold-out tasks intentionally empty in v1. Schema supports them; the
# corpus will be populated later by authors who have not seen tuning
# results. Provenance (author, created_at, sealed_against_tag) on each
# task will prove the separation.
# [[tasks.holdout]]  (none yet)
