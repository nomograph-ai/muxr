  <circle cx="256" cy="170" r="12" fill="#2c2417"/>
  <circle cx="372" cy="170" r="12" fill="none" stroke="#2c2417" stroke-width="3"/>

  <!-- Switching arc across bottom -->
  <path d="M 140 390 Q 140 440 256 440 Q 372 440 372 390" fill="none" stroke="#2c2417" stroke-width="6"/>
  <polygon points="246,448 256,424 266,448" fill="#2c2417"/>
</svg>
