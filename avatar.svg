<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="background:#faf6ed">
  <!-- Outer frame -->
  <rect x="40" y="40" width="432" height="432" rx="0" fill="none" stroke="#2c2417" stroke-width="5"/>

  <!-- Header bar -->
  <rect x="40" y="40" width="432" height="80" rx="0" fill="#2c2417"/>
  <text x="256" y="94" text-anchor="middle" fill="#faf6ed" font-family="monospace" font-size="52" font-weight="800">muxr</text>

  <!-- Three thick vertical lines (the verticals) -->
  <line x1="140" y1="170" x2="140" y2="390" stroke="#2c2417" stroke-width="6"/>
  <line x1="256" y1="170" x2="256" y2="390" stroke="#2c2417" stroke-width="6"/>
  <line x1="372" y1="170" x2="372" y2="390" stroke="#2c2417" stroke-width="3" stroke-dasharray="12,8"/>

  <!-- Dots at top of each vertical -->
