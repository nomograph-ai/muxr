include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - component: gitlab.com/nomograph/pipeline/rust-cli@v2.6.0
    inputs:
      binary_name: muxr
      project_description: "Tmux session manager for AI coding workflows."
      audit_allow_failure: false
      crates_publish: true
  - component: gitlab.com/nomograph/pipeline/agent-shape@v2.6.0
    inputs:
      binary_name: muxr

stages: [test, build, sign, publish, release, notify]

# Backstop against absolute symlinks landing in the tree. See
# scripts/check-symlinks.sh for rationale.
check-symlinks:
  stage: test
  image: alpine:3.19
  before_script:
    - apk add --no-cache bash git
  script:
    - bash scripts/check-symlinks.sh

# Nudge the kits registry to re-sense on tag push, so own-tier updates
# land in an MR immediately instead of waiting for the twice-daily
# schedule. See nomograph/pipeline kit-registry@v3.1.0.
notify-kits:
  stage: notify
  rules:
    - if: $CI_COMMIT_TAG
  trigger:
    project: nomograph/kits
    branch: main
  # no strategy:depend -- fire and forget. kits has its own lifecycle.

default:
  tags: [storr]
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
