  <text x="676" y="98" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">SESSION</text>
  <text x="830" y="98" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">TOOL</text>
  <text x="910" y="98" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">DIR</text>
  <line x1="676" y1="104" x2="1000" y2="104" stroke="#c4b99a" stroke-width="0.8"/>

  <rect x="676" y="108" width="320" height="20" fill="none" stroke="#2c2417" stroke-width="1"/>
  <text x="686" y="122" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">work/api</text>
  <text x="830" y="122" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">claude</text>
  <text x="910" y="122" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">~/work</text>

  <rect x="676" y="132" width="320" height="20" fill="none" stroke="#2c2417" stroke-width="1"/>
  <text x="686" y="146" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">work/auth</text>
  <text x="830" y="146" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">claude</text>
  <text x="910" y="146" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">~/work</text>

  <rect x="676" y="156" width="320" height="20" fill="none" stroke="#2c2417" stroke-width="1"/>
  <text x="686" y="170" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">personal/blog</text>
  <text x="830" y="170" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">vim</text>
  <text x="910" y="170" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">~/personal</text>

  <line x1="676" y1="184" x2="996" y2="184" stroke="#c4b99a" stroke-width="0.5" stroke-dasharray="3,3"/>

  <rect x="676" y="190" width="320" height="20" fill="none" stroke="#2c2417" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="686" y="204" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417">remote-A/session</text>
  <text x="830" y="204" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">SSH</text>

  <rect x="676" y="214" width="320" height="20" fill="none" stroke="#2c2417" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="686" y="228" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417">remote-B/session</text>
  <text x="830" y="228" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">SSH</text>

  <!-- TUI -->
  <line x1="1010" y1="86" x2="1010" y2="330" stroke="#c4b99a" stroke-width="0.5" stroke-dasharray="3,3"/>
  <rect x="1020" y="86" width="130" height="240" fill="none" stroke="#2c2417" stroke-width="1.5"/>
  <rect x="1020" y="86" width="130" height="20" fill="#2c2417"/>
  <text x="1085" y="100" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#faf6ed" text-anchor="middle" font-weight="bold">muxr switch</text>
  <text x="1032" y="124" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">&gt; work/api</text>
  <text x="1032" y="142" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  work/auth</text>
  <text x="1032" y="160" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  personal/blog</text>
  <line x1="1025" y1="168" x2="1145" y2="168" stroke="#c4b99a" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="1032" y="186" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  remote-A</text>
  <text x="1032" y="204" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  remote-B</text>
  <line x1="1025" y1="216" x2="1145" y2="216" stroke="#2c2417" stroke-width="0.5"/>
  <text x="1032" y="234" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">j/k  navigate</text>
  <text x="1032" y="248" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">Enter  attach</text>
  <text x="1032" y="262" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">d    kill</text>
  <text x="1032" y="276" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">/    filter</text>

  <!-- Footer -->
  <line x1="40" y1="360" x2="1160" y2="360" stroke="#c4b99a" stroke-width="1"/>
  <text x="600" y="380" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#6b5d4f" text-anchor="middle">one command to open -- one keybind to switch -- survives reboots</text>
  <text x="590" y="408" text-anchor="middle" fill="#2c2417" font-family="'IBM Plex Mono', monospace" font-size="9" font-weight="600">Built with GitLab</text>
