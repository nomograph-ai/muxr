<svg viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0,0 7,3.5 0,7" fill="#2c2417"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="430" fill="#faf6ed" stroke="#2c2417" stroke-width="3"/>

  <rect x="0" y="0" width="1200" height="36" fill="#2c2417"/>
  <text x="16" y="24" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#faf6ed" font-weight="bold">muxr -- tmux session manager</text>
  <text x="1184" y="24" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#c4b99a" text-anchor="end">one command to open -- one keybind to switch</text>

  <!-- Left: Config -->
  <rect x="40" y="56" width="260" height="280" fill="none" stroke="#2c2417" stroke-width="1.5"/>
  <rect x="40" y="56" width="260" height="24" fill="#2c2417"/>
  <text x="170" y="72" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#faf6ed" text-anchor="middle" font-weight="bold">config.toml</text>

  <text x="56" y="100" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">verticals</text>
  <text x="56" y="116" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  work/  api, auth, frontend</text>
  <text x="56" y="132" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  personal/  blog, tools</text>
  <line x1="56" y1="142" x2="284" y2="142" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="56" y="160" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">remotes</text>
  <text x="56" y="176" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  remote-A  SSH, auto-reconnect</text>
  <text x="56" y="192" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  remote-B  SSH, auto-reconnect</text>
  <line x1="56" y1="202" x2="284" y2="202" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="56" y="220" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">tool per session</text>
  <text x="56" y="236" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  claude, vim, shell</text>
  <line x1="56" y1="246" x2="284" y2="246" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="56" y="264" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">session naming</text>
  <text x="56" y="280" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  vertical / context</text>
  <text x="170" y="322" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f" text-anchor="middle">one config file, everything</text>

  <!-- Arrow -->
  <line x1="300" y1="196" x2="370" y2="196" stroke="#2c2417" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Center: muxr commands -->
  <rect x="380" y="56" width="200" height="280" fill="none" stroke="#2c2417" stroke-width="2.5"/>
  <rect x="380" y="56" width="200" height="28" fill="#2c2417"/>
  <text x="480" y="74" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#faf6ed" text-anchor="middle" font-weight="bold">muxr</text>

  <text x="396" y="104" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2c2417" font-weight="bold">open</text>
  <text x="396" y="120" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  new-session + cd + tool</text>
  <text x="396" y="144" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2c2417" font-weight="bold">switch</text>
  <text x="396" y="160" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  fuzzy filter, attach</text>
  <text x="396" y="184" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2c2417" font-weight="bold">save / restore</text>
  <text x="396" y="200" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  survives reboots</text>
  <text x="396" y="224" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2c2417" font-weight="bold">claude-status</text>
  <text x="396" y="240" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  tmux statusline</text>
  <text x="480" y="320" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f" text-anchor="middle">server isolation</text>

  <!-- Arrows -->
  <line x1="580" y1="110" x2="650" y2="100" stroke="#2c2417" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="580" y1="155" x2="650" y2="155" stroke="#2c2417" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="580" y1="200" x2="650" y2="230" stroke="#2c2417" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>

