<svg viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0,0 7,3.5 0,7" fill="#2c2417"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="430" fill="#faf6ed" stroke="#2c2417" stroke-width="3"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="36" fill="#2c2417"/>
  <text x="16" y="24" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#faf6ed" font-weight="bold">muxr -- harness session multiplexer</text>
  <text x="1184" y="24" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#c4b99a" text-anchor="end">runtime + filesystem + tmux, kept in sync</text>

  <!-- Layer label bar -->
  <rect x="40" y="52" width="1120" height="26" fill="none" stroke="#c4b99a" stroke-width="1"/>
  <text x="56" y="69" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">harness / campaign / session / segment -- the address every operation respects</text>
  <text x="1144" y="69" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" text-anchor="end">muxr rename = authoritative</text>

  <!-- Left: Inputs -->
  <rect x="40" y="94" width="280" height="240" fill="none" stroke="#2c2417" stroke-width="2"/>
  <rect x="40" y="94" width="280" height="28" fill="#2c2417"/>
  <text x="180" y="112" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#faf6ed" text-anchor="middle" font-weight="bold">INPUTS</text>

  <text x="56" y="142" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">harness configs</text>
  <text x="56" y="158" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  campaigns/&lt;name&gt;/campaign.md</text>
  <text x="56" y="174" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  sessions/&lt;date&gt;-&lt;segment&gt;.md</text>
  <text x="56" y="190" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  paths, tools, system prompt</text>

  <line x1="56" y1="200" x2="304" y2="200" stroke="#c4b99a" stroke-width="0.8"/>

  <text x="56" y="218" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">ai runtimes</text>
  <text x="56" y="234" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  claude code, cursor, ...</text>
  <text x="56" y="250" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  each has its own session id</text>

  <line x1="56" y1="260" x2="304" y2="260" stroke="#c4b99a" stroke-width="0.8"/>

  <text x="56" y="278" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">tmux state</text>
  <text x="56" y="294" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  named sessions per address</text>
  <text x="56" y="310" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  server isolation via -L</text>

  <!-- Arrow inputs -> process -->
  <line x1="320" y1="214" x2="380" y2="214" stroke="#2c2417" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Center: Process -->
  <rect x="390" y="94" width="280" height="240" fill="none" stroke="#2c2417" stroke-width="2.5"/>
  <rect x="390" y="94" width="280" height="32" fill="#2c2417"/>
  <text x="530" y="115" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#faf6ed" text-anchor="middle" font-weight="bold">muxr</text>

  <!-- Multiplexer schematic: three rails converging through a junction -->
  <line x1="406" y1="148" x2="500" y2="180" stroke="#2c2417" stroke-width="1.5"/>
  <line x1="406" y1="180" x2="500" y2="180" stroke="#2c2417" stroke-width="1.5"/>
  <line x1="406" y1="212" x2="500" y2="180" stroke="#2c2417" stroke-width="1.5"/>
  <circle cx="406" cy="148" r="3" fill="#2c2417"/>
  <circle cx="406" cy="180" r="3" fill="#2c2417"/>
  <circle cx="406" cy="212" r="3" fill="#2c2417"/>

  <!-- Junction box -->
  <rect x="500" y="160" width="40" height="40" fill="#faf6ed" stroke="#2c2417" stroke-width="2"/>
  <text x="520" y="186" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#2c2417" text-anchor="middle" font-weight="bold">M</text>

  <!-- Output rail -->
  <line x1="540" y1="180" x2="650" y2="180" stroke="#2c2417" stroke-width="2" marker-end="url(#a)"/>

  <!-- Capability list under multiplexer -->
  <line x1="406" y1="234" x2="654" y2="234" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="406" y="252" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">session lookup</text>
  <text x="406" y="266" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  resolve harness/campaign/segment</text>
  <text x="406" y="284" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">rename</text>
  <text x="406" y="298" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  tmux + file move + runtime relink</text>
  <text x="406" y="316" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">save / restore</text>

  <!-- Arrow process -> outputs -->
  <line x1="670" y1="214" x2="730" y2="214" stroke="#2c2417" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Right: Outputs -->
  <rect x="740" y="94" width="420" height="240" fill="none" stroke="#2c2417" stroke-width="2"/>
  <rect x="740" y="94" width="420" height="28" fill="#2c2417"/>
  <text x="950" y="112" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#faf6ed" text-anchor="middle" font-weight="bold">OUTPUTS -- SYNCHRONIZED STATE</text>

  <!-- Three coupled rows: tmux | file | runtime -->
  <text x="756" y="142" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">TMUX SESSION</text>
  <text x="940" y="142" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">SESSION FILE</text>
  <text x="1080" y="142" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">RUNTIME ID</text>
  <line x1="756" y1="148" x2="1144" y2="148" stroke="#c4b99a" stroke-width="0.8"/>

  <rect x="756" y="154" width="170" height="22" fill="none" stroke="#2c2417" stroke-width="1"/>
  <text x="766" y="169" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">keaton/audit/0425</text>
  <rect x="934" y="154" width="130" height="22" fill="none" stroke="#2c2417" stroke-width="1"/>
  <text x="944" y="169" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">0425.md</text>
  <rect x="1072" y="154" width="72" height="22" fill="none" stroke="#2c2417" stroke-width="1"/>
  <text x="1082" y="169" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">a3f9...</text>

  <rect x="756" y="180" width="170" height="22" fill="none" stroke="#2c2417" stroke-width="1"/>
  <text x="766" y="195" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">muxr/rename/move</text>
  <rect x="934" y="180" width="130" height="22" fill="none" stroke="#2c2417" stroke-width="1"/>
  <text x="944" y="195" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">move.md</text>
  <rect x="1072" y="180" width="72" height="22" fill="none" stroke="#2c2417" stroke-width="1"/>
  <text x="1082" y="195" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">7c14...</text>

  <rect x="756" y="206" width="170" height="22" fill="none" stroke="#2c2417" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="766" y="221" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417">remote-A/lab/run</text>
  <rect x="934" y="206" width="130" height="22" fill="none" stroke="#2c2417" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="944" y="221" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">run.md</text>
  <rect x="1072" y="206" width="72" height="22" fill="none" stroke="#2c2417" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="1082" y="221" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">b2e0...</text>

  <!-- Coupling brackets -->
  <line x1="756" y1="240" x2="1144" y2="240" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="756" y="258" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">invariants</text>
  <text x="756" y="274" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  rename moves all three together</text>
  <text x="756" y="290" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  no orphan session files on disk</text>
  <text x="756" y="306" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  restore reattaches every row</text>
  <text x="756" y="322" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  control plane stays out of state</text>

  <!-- Footer -->
  <line x1="40" y1="360" x2="1160" y2="360" stroke="#c4b99a" stroke-width="1"/>
  <text x="600" y="380" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#6b5d4f" text-anchor="middle">one address, three subsystems, kept in lockstep</text>
  <text x="590" y="408" text-anchor="middle" fill="#2c2417" font-family="'IBM Plex Mono', monospace" font-size="9" font-weight="600">Built with GitLab</text>
  <g transform="translate(634, 397) scale(0.045)">
    <path d="M282.83,170.73l-.27-.69-26.14-68.22a6.81,6.81,0,0,0-2.69-3.24,7,7,0,0,0-8,.43,7,7,0,0,0-2.32,3.52l-17.65,54H154.29l-17.65-54A6.86,6.86,0,0,0,134.32,99a7,7,0,0,0-8-.43,6.87,6.87,0,0,0-2.69,3.24L97.44,170l-.26.69a48.54,48.54,0,0,0,16.1,56.1l.09.07.24.17,39.82,29.82,19.7,14.91,12,9.06a8.07,8.07,0,0,0,9.76,0l12-9.06,19.7-14.91,40.06-30,.1-.08A48.56,48.56,0,0,0,282.83,170.73Z" fill="#E24329"/>
    <path d="M282.83,170.73l-.27-.69a88.3,88.3,0,0,0-35.15,15.8L190,229.25c19.55,14.79,36.57,27.64,36.57,27.64l40.06-30,.1-.08A48.56,48.56,0,0,0,282.83,170.73Z" fill="#FC6D26"/>
    <path d="M153.43,256.89l19.7,14.91,12,9.06a8.07,8.07,0,0,0,9.76,0l12-9.06,19.7-14.91S209.55,244,190,229.25C170.45,244,153.43,256.89,153.43,256.89Z" fill="#FCA326"/>
    <path d="M132.58,185.84A88.19,88.19,0,0,0,97.44,170l-.26.69a48.54,48.54,0,0,0,16.1,56.1l.09.07.24.17,39.82,29.82s17-12.85,36.57-27.64Z" fill="#FC6D26"/>
  </g>
</svg>
